name: Deploy Pages

# Builds the docs app as a static export and publishes it to GitHub Pages at
# https://zanasalimi.github.io/ember-toast/. The export target is gated behind
# PAGES=1 in apps/docs/next.config.mjs, so the Docker (standalone) build is
# unaffected.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for the deploy: read the repo, write Pages, mint the OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build static export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter=./packages/*

      - name: Build docs (static export)
        env:
          PAGES: "1"
        run: pnpm --filter docs build

      - name: Disable Jekyll
        run: touch apps/docs/out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
