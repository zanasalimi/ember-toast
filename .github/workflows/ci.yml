name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build --filter=./packages/*

      - name: Unit tests
        run: pnpm test

      - name: Size limit
        run: pnpm size

  e2e:
    name: playwright (swipe · animation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install browsers
        run: pnpm --filter @embertoast/react exec playwright install --with-deps
      - name: Build
        run: pnpm build
      - name: E2E
        run: pnpm test:e2e

  docker:
    name: docs image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docs image
        run: docker build -f apps/docs/Dockerfile -t embertoast-docs:ci .
